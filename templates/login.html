<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — SONACOS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
  <a href="{{ url_for('index') }}" class="btn-back"><i class="fas fa-arrow-left"></i> Retour</a>

  <div class="login-split">
    <!-- LEFT gradient panel -->
    <div class="login-left"></div>

    <!-- CENTER card -->
    <div class="login-center">
      <div class="login-card">
        <div class="login-logo-box">
          <img src="{{ url_for('static', filename='images/logo.jpeg') }}" alt="Logo SONACOS" width="140" height="140" style="object-fit:contain;">
        </div>
        <p class="login-subtitle">Accès à votre espace de travail</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="prenom.nom@sonacos.sn" required>
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <div class="input-password">
              <input type="password" name="password" id="passwordInput" placeholder="••••••••" required>
              <button type="button" onclick="togglePassword()"><i class="fas fa-eye" id="eyeIcon"></i></button>
            </div>
          </div>
          <button type="submit" class="btn-login">Se connecter</button>
        </form>
        <a href="#" class="forgot-link">Mot de passe oublié ?</a>
      </div>
    </div>

    <!-- RIGHT gradient panel -->
    <div class="login-right"></div>
  </div>

<script>
function togglePassword() {
  const input = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}
</script>
</body>
</html>
